version: '3.8'
services:
  postgres:
    image: postgres:18-alpine
    container_name: nce-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nce_root_123}
      POSTGRES_DB: nce_db
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - nce-network

  redis:
    image: redis:7.0
    container_name: nce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nce-network

  account-center:
    build: ./backend/shared/account-center
    container_name: nce-account-center
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - nce-network

  notification-service:
    build: ./backend/shared/notification-service
    container_name: nce-notification-service
    ports:
      - "3002:3002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - nce-network

  config-service:
    build: ./backend/shared/config-service
    container_name: nce-config-service
    ports:
      - "3003:3003"
    depends_on:
      - postgres
    networks:
      - nce-network

  file-storage-service:
    build: ./backend/shared/file-storage-service
    container_name: nce-file-storage-service
    ports:
      - "3004:3004"
    volumes:
      - file-storage:/app/uploads
    networks:
      - nce-network

  cash-flow-engine:
    build: ./backend/core/cash-flow-engine
    container_name: nce-cash-flow-engine
    ports:
      - "3005:3005"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
    depends_on:
      - postgres
    networks:
      - nce-network

  content-hub:
    build: ./backend/core/content-hub
    container_name: nce-content-hub
    ports:
      - "3006:3006"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
    depends_on:
      - postgres
    networks:
      - nce-network

  data-product-api:
    build: ./backend/core/data-product-api
    container_name: nce-data-product-api
    ports:
      - "3007:3007"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
    depends_on:
      - postgres
    networks:
      - nce-network

volumes:
  postgres-data:
  redis-data:
  file-storage:

networks:
  nce-network:
    driver: bridge
