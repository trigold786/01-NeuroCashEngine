services:
  traefik:
    image: docker.m.daocloud.io/traefik:v3.3
    container_name: nce-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/dev-cert.pem:/etc/traefik/certs/dev-cert.pem:ro
      - ./traefik/dev-key.pem:/etc/traefik/certs/dev-key.pem:ro
      - traefik-letsencrypt:/letsencrypt
    command:
      - "--api.dashboard=true"
      - "--api.debug=true"
      - "--log.level=DEBUG"
      - "--ping=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@neurocashengine.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
    restart: unless-stopped
    networks:
      - nce-network

  postgres:
    image: postgres:16
    container_name: nce-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-nce_root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nce_root_123}
      POSTGRES_DB: nce_db
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nce_root -d nce_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nce-network

  redis:
    image: redis:7-alpine
    container_name: nce-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nce-network

  account-center:
    build: ./backend/shared/account-center
    container_name: nce-account-center
    expose:
      - "3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-nce_jwt_secret_key_123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    networks:
      - nce-network

  cash-flow-engine:
    build: ./backend/core/cash-flow-engine
    container_name: nce-cash-flow-engine
    expose:
      - "3005"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
      - JWT_SECRET=${JWT_SECRET:-nce_jwt_secret_key_123}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - nce-network

  content-hub:
    build: ./backend/core/content-hub
    container_name: nce-content-hub
    expose:
      - "3006"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - nce-network

  data-product-api:
    build: ./backend/core/data-product-api
    container_name: nce-data-product-api
    expose:
      - "3007"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - nce-network

  frontend:
    build:
      context: ./frontend
      dockerfile: apps/pwa/Dockerfile
    container_name: nce-frontend
    expose:
      - "80"
    depends_on:
      - account-center
      - cash-flow-engine
      - content-hub
    restart: unless-stopped
    networks:
      - nce-network

  aktools:
    image: lev1s/aktools:latest
    container_name: nce-aktools
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - nce-network

volumes:
  postgres-data:
  redis-data:
  traefik-letsencrypt:

networks:
  nce-network:
    driver: bridge
