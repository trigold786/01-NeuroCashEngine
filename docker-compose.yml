version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: nce-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-nce_root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nce_root_123}
      POSTGRES_DB: nce_db
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - nce-network

  redis:
    image: redis:7-alpine
    container_name: nce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nce-network

  account-center:
    build: ./backend/shared/account-center
    container_name: nce-account-center
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-nce_jwt_secret_key_123}
    depends_on:
      - postgres
      - redis
    networks:
      - nce-network

  cash-flow-engine:
    build: ./backend/core/cash-flow-engine
    container_name: nce-cash-flow-engine
    ports:
      - "3005:3005"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
      - JWT_SECRET=${JWT_SECRET:-nce_jwt_secret_key_123}
    depends_on:
      - postgres
    networks:
      - nce-network

  content-hub:
    build: ./backend/core/content-hub
    container_name: nce-content-hub
    ports:
      - "3006:3006"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
    depends_on:
      - postgres
    networks:
      - nce-network

  data-product-api:
    build: ./backend/core/data-product-api
    container_name: nce-data-product-api
    ports:
      - "3007:3007"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-nce_root}
      - DB_PASSWORD=${DB_PASSWORD:-nce_root_123}
      - DB_NAME=nce_db
    depends_on:
      - postgres
    networks:
      - nce-network

  frontend:
    build: ./frontend/apps/pwa
    container_name: nce-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_ACCOUNT_API_URL=http://account-center:3001
      - VITE_CASHFLOW_API_URL=http://cash-flow-engine:3005
      - VITE_CONTENT_API_URL=http://content-hub:3006
    depends_on:
      - account-center
      - cash-flow-engine
      - content-hub
    networks:
      - nce-network

volumes:
  postgres-data:
  redis-data:

networks:
  nce-network:
    driver: bridge
