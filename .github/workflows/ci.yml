name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
        continue-on-error: true

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - backend/shared/account-center
          - backend/core/cash-flow-engine
          - backend/core/content-hub
          - backend/core/data-product-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.service }}
      - run: npx tsc --noEmit
        working-directory: ${{ matrix.service }}

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nce_root
          POSTGRES_PASSWORD: nce_root_123
          POSTGRES_DB: nce_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    strategy:
      matrix:
        service:
          - backend/core/cash-flow-engine
          - backend/core/data-product-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.service }}
      - run: npm test -- --maxWorkers=2
        working-directory: ${{ matrix.service }}
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: nce_root
          DB_PASSWORD: nce_root_123
          DB_NAME: nce_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: nce_jwt_secret_key_123

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: frontend
      - run: npm run build -w @nce/shared
        working-directory: frontend
      - run: npm test
        working-directory: frontend/apps/pwa
